<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <style>
        .submit {
            display: none;
        }
        
        .warning {
            display: none;
        }
    </style>
</head>
<body>

    <div>
    <!-- Input field where user types -->
    <input type="text" class="name">
    
    <!-- Warning message that shows when input is less than 6 characters -->
    <p class="warning">At least 6 characters</p>
    
    <!-- Submit button that appears when input is valid -->
    <button class="submit">Submit</button>
</div>

    <script src="./app.js"></script>
</body>
</html>
