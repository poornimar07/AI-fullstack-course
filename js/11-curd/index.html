<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Application</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .container {
            max-width: 600px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .show-alert {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            z-index: 1050;
        }
        ul#dataList {
            list-style: none;
            padding: 0;
        }
        ul#dataList li {
            background: #e9ecef;
            margin: 5px 0;
            padding: 10px;
            border-radius: 5px;
            display: flex;
            gap: 30px;
        }
        .pagination-container {
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="show-alert"></div>
        <h2 class="text-center mb-4">CRUD Application</h2>
        
        <div class="form-floating mb-3">
            <input type="text" class="form-control" id="inputData" placeholder="Enter Post">
            <label for="inputData">Enter Post</label>
        </div>
        <button type="button" class="btn btn-success w-100 addButton">Add Post</button>
        
        <input type="text" id="searchInput" class="form-control mt-3" placeholder="Search...">
        
        <ul id="dataList" class="mt-3"></ul>
        <div id="pagination" class="pagination-container mt-3"></div>
    </div>
    
    <script src="./app.js"></script>
</body>
</html>
